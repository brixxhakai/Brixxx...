<!DOCTYPE html>
<html>
<head>
<title>ZENIN 3D VIDEO GALLERY</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
overflow-x:hidden;
}

/* animated background */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle at 50% 50%, #111, #000);
animation:bgmove 8s infinite alternate;
z-index:-1;
}

@keyframes bgmove{
from{transform:scale(1)}
to{transform:scale(1.2)}
}

h1{
margin-top:30px;
font-size:40px;
letter-spacing:4px;
}

/* upload button */

.upload{
margin:30px;
}

input{
padding:10px;
}

/* 3D gallery */

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:40px;
}

.card{
width:300px;
perspective:1000px;
}

video{
width:100%;
border-radius:20px;
box-shadow:0 0 25px rgba(0,255,255,0.6);
transition:0.5s;
}

video:hover{
transform:rotateY(15deg) rotateX(10deg) scale(1.05);
}

</style>
</head>

<body>

<h1>ZENIN 3D VIDEO GALLERY</h1>

<div class="upload">
<input type="file" id="upload" accept="video/*" multiple>
</div>

<div class="gallery" id="gallery"></div>

<script>

let upload=document.getElementById("upload")
let gallery=document.getElementById("gallery")

upload.onchange=function(){

let files=this.files

for(let i=0;i<files.length;i++){

let video=document.createElement("video")
video.src=URL.createObjectURL(files[i])
video.controls=true

let card=document.createElement("div")
card.className="card"

card.appendChild(video)
gallery.appendChild(card)

}

}

</script>

</body>
</html>
